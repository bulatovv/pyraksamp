[project]
name = "pyraksamp"
version = "0.1.0"
description = "SA:MP 0.3.7 headless client library"
readme = "README.md"
authors = [
    { email = "albert.fz@yandex.ru" }
]
requires-python = ">=3.10"
dependencies = []

[build-system]
requires = ["scikit-build-core>=0.10", "pybind11>=2.13"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.build-type = "Release"
wheel.packages = ["src/pyraksamp"]

[tool.uv]
cache-keys = [
    { file = "pyproject.toml" },
    { file = "CMakeLists.txt" },
    { file = "src/**/*.cpp" },
    { file = "src/**/*.h" },
]
